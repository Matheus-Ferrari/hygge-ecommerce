<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-S1BC0HPJBH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-S1BC0HPJBH');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento aprovado | Hygge Games</title>
  <meta name="description" content="Pagamento aprovado com sucesso na Hygge Games." />
  <link rel="stylesheet" href="src/css/style.css" />
  <link rel="stylesheet" href="src/css/footer.css" />
  <link rel="icon" href="/img/logopreta.png" type="image/png" sizes="any" />
  <style>
    #main-header.header {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      z-index: 9999 !important;
      background: var(--verde-header) !important;
      box-shadow: var(--sombra-header-fixo) !important;
    }
  </style>
  <script src="/preloader.js"></script>
</head>
<body>
  <header id="main-header" class="header solid">
    <button class="menu-btn" aria-label="Abrir menu">
      <span class="hamburger"></span>
      <span class="hamburger"></span>
      <span class="hamburger"></span>
    </button>
    <a href="/" aria-label="Ir para a página inicial">
       <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Logo Hygge Games" class="logo logo-img">
    </a>
    <div class="header-actions">
      <a href="/carrinho" class="cart-btn" aria-label="Carrinho">
        <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:block;"><circle cx="9" cy="21" r="1.5"/><circle cx="19" cy="21" r="1.5"/><path d="M5 6h2l1.68 9.39A2 2 0 0 0 10.65 17h6.7a2 2 0 0 0 1.97-1.61L21 8H7"/></svg>
      </a>
      <button class="search-btn" aria-label="Buscar">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <a href="/login" class="btn-entrar" style="margin-left:5px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M9 18l6-6-6-6"/><path d="M15 12H3"/><rect x="17" y="3" width="4" height="18" rx="2"/></svg>
        <span>Entrar</span>
      </a>
    </div>
  </header>

  <main class="container-large" style="padding:140px 0 70px 0; max-width:860px;">
    <section class="produto-card" style="padding:30px; min-height:auto; border-radius:24px;">
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
        <span style="width:34px; height:34px; border-radius:50%; background:#008366; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:22px; font-weight:700;">✓</span>
        <h1 class="section-title" style="margin:0; font-size:2rem;">Pagamento aprovado</h1>
      </div>

      <p style="font-size:1.1rem; margin:0 0 18px 0;">Seu pedido foi realizado com sucesso.</p>

      <div id="order-summary" style="background:#f4f1ed; border-radius:16px; padding:14px 16px; margin-bottom:20px;">
        <p style="margin:0;">Resumo do pedido indisponível.</p>
      </div>

      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <a href="/perfil" class="btn-comprar" style="margin:0;">Ir para meus pedidos</a>
        <a href="/todos-os-jogos" class="btn-mostrar-jogos">Continuar comprando</a>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script>
    (function () {
      const summaryEl = document.getElementById('order-summary');
      const raw = localStorage.getItem('last_order');

      // Limpa o carrinho ao chegar na página de sucesso.
      localStorage.removeItem('cart');
      localStorage.removeItem('carrinho');
      localStorage.removeItem('checkout_draft');

      if (!raw || !summaryEl) return;

      try {
        const order = JSON.parse(raw);
        const itens = Array.isArray(order?.itens) ? order.itens : [];
        const subtotal = Number(order?.subtotal || 0);
        const frete = Number(order?.frete || 0);
        const total = Number(order?.total || 0);
        const metodoEntrega = String(order?.metodoEntrega || '').trim();
        const freteMetodo = String(order?.freteMetodo || '').trim();

        const format = (v) => Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        summaryEl.textContent = '';

        itens.forEach((item) => {
          const nome = String(item?.nome || 'Produto');
          const imgSrc = String(item?.imagem || '/img/logopreta.png');
          const qtd = Number(item?.quantidade ?? 1);
          const preco = Number(item?.preco ?? 0);

          const row = document.createElement('div');
          row.style.cssText = 'display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #e2dcd6;';

          const img = document.createElement('img');
          img.src = imgSrc;
          img.alt = nome;
          img.style.cssText = 'width:58px; height:58px; object-fit:cover; border-radius:10px; flex-shrink:0; background:#ece7e0;';
          img.onerror = function () { this.src = '/img/logopreta.png'; };

          const info = document.createElement('div');
          info.style.cssText = 'flex:1; min-width:0;';

          const pNome = document.createElement('p');
          pNome.style.cssText = 'margin:0 0 3px 0; font-weight:600; font-size:0.97rem; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;';
          pNome.textContent = nome;

          const pDetail = document.createElement('p');
          pDetail.style.cssText = 'margin:0; color:#666; font-size:0.88rem;';
          pDetail.textContent = `Qtd: ${qtd}  ·  ${format(preco)}`;

          info.appendChild(pNome);
          info.appendChild(pDetail);
          row.appendChild(img);
          row.appendChild(info);
          summaryEl.appendChild(row);
        });

        const totaisDiv = document.createElement('div');
        totaisDiv.style.cssText = 'margin-top:12px; display:flex; flex-direction:column; gap:4px;';

        const mkLine = (text, value, extra) => {
          const p = document.createElement('p');
          p.style.cssText = extra || 'margin:0; font-size:0.95rem;';
          p.append(text + ' ');
          const strong = document.createElement('strong');
          strong.textContent = value;
          p.appendChild(strong);
          return p;
        };

        totaisDiv.appendChild(mkLine('Subtotal:', format(subtotal)));
        totaisDiv.appendChild(mkLine('Frete:', frete > 0 ? format(frete) : 'Grátis'));

        if (freteMetodo || metodoEntrega) {
          const entregaLabel = (metodoEntrega === 'retirada') ? 'Retirada' : (freteMetodo || metodoEntrega);
          totaisDiv.appendChild(mkLine('Entrega:', entregaLabel));
        }

        totaisDiv.appendChild(mkLine('Total:', format(total), 'margin:4px 0 0 0; font-size:1.05rem; border-top:1px solid #d9d3cc; padding-top:8px;'));
        summaryEl.appendChild(totaisDiv);
      } catch {
        // Mantém fallback padrão.
      }
    })();
  </script>

  <script>
    fetch('/components/footer.html')
      .then((response) => response.text())
      .then((html) => {
        document.getElementById('footer-container').innerHTML = html;
      });
  </script>
  <script type="module" src="src/js/menu.js"></script>
  <script type="module" src="src/js/cartBadge.js"></script>
  <script type="module" src="src/js/headerUser.js"></script>
  <script type="module" src="src/js/script.js"></script>
  <script type="module">
    import { trackPurchase } from './src/js/metaPixel.js';
    try {
      const raw = localStorage.getItem('last_order');
      if (raw) {
        const order = JSON.parse(raw);
        const itens = Array.isArray(order?.itens) ? order.itens : [];
        trackPurchase({
          contentIds: itens.map((i) => i.id),
          value: Number(order?.total || 0),
          currency: 'BRL',
          orderId: order?.userId || '',
        }, order?.fbEventId || undefined);
      }
    } catch { /* ignore */ }
  </script>
</body>
</html>
