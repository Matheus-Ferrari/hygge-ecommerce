<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha | Hygge Games</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/css/footer.css">
  <link rel="icon" href="src/img/logo.png" type="image/png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      min-height: 100vh;
      box-sizing: border-box;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      height: 100vh;
    }
    .hero {
      flex: 1 0 auto;
    }
    #footer-container, .footer-hygge {
      margin: 0 !important;
      padding: 0 !important;
      width: 100vw !important;
      max-width: 100vw !important;
      left: 0 !important;
      right: 0 !important;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .footer-hygge {
      border-radius: 0 !important;
    }
  </style>
</head>
<body>
  <h1 class="sr-only">Esqueci minha senha - Hygge Games</h1>

  <header id="main-header" class="header">
    <!-- Header global será carregado normalmente -->
  </header>

  <section class="hero" style="width:100vw;height:70vh;min-height:0;overflow:hidden;padding:0;margin:0;display:flex;align-items:center;justify-content:center;background:none;">
    <img id="banner-login" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Banner Esqueci minha senha" style="width:100vw;height:100%;object-fit:cover;display:block;">

    <div class="login-center-wrapper">
      <div class="login-container">
        <div style="width:100%;text-align:center;padding-top:0;margin-bottom:-42px;">
          <h2 style="font-family:'Inter',Arial,sans-serif;font-size:1.35rem;font-weight:700;margin:0 0 10px 0;color:#222;">Esqueci minha senha</h2>
          <div style="font-size:1rem;color:#444;opacity:0.85;margin-bottom:0;">Digite seu e-mail para receber um link de redefinição de senha.</div>
          <div class="login-logo" style="margin:8px auto 0 auto;">
             <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Logo Hygge Games" class="logo-img">
          </div>
        </div>

        <form class="login-form" id="forgot-form" style="margin-top:-30px;gap:7px;">
          <input class="login-input" type="email" name="email" placeholder="E-mail" autocomplete="email" required>
          <button class="login-btn" type="submit">Enviar link de recuperação</button>
          <button type="button" style="width:98%;background:#fff;color:#00966C;border:2px solid #00966C;border-radius:20px;padding:12px 0;font-size:1.1rem;font-weight:600;cursor:pointer;margin:5px 0 0 0;transition:background 0.2s;text-align:center;box-shadow:0 2px 8px 0 rgba(0,0,0,0.04);" onclick="window.location.href='/login'">Voltar para login</button>
        </form>

        <div id="forgot-message" style="font-size:0.98rem;text-align:center;margin-top:8px;"></div>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script type="module" src="src/firebase/firebaseConfig.js"></script>
  <script type="module" src="src/js/forgot-password.js"></script>
  <script type="module" src="src/js/script.js"></script>

  <script>
      fetch('/components/footer.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('footer-container').innerHTML = html;
      });
  </script>
</body>
</html>
