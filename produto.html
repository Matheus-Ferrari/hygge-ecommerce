<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S1BC0HPJBH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S1BC0HPJBH');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto | Hygge Games</title>
    <meta name="description" content="Detalhes do produto Hygge Games. Veja informações, estoque e adicione ao carrinho.">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/footer.css">
    <link rel="stylesheet" href="src/css/product.css">
    <link rel="icon" href="/img/logopreta.png" type="image/png" sizes="any">
</head>
<body>
    <h1 class="sr-only">Produto - Hygge Games</h1>

    <!-- HEADER (copiado exatamente de /todos-os-jogos) -->
    <header id="main-header" class="header">
        <button class="menu-btn" aria-label="Abrir menu">
            <span class="hamburger"></span>
            <span class="hamburger"></span>
            <span class="hamburger"></span>
        </button>
        <a href="/"> <img src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Logo Hygge Games" class="logo logo-img"></a>
        <div class="header-actions">
            <a href="/carrinho" class="cart-btn" aria-label="Carrinho">
                <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="display:block;"><circle cx="9" cy="21" r="1.5"/><circle cx="19" cy="21" r="1.5"/><path d="M5 6h2l1.68 9.39A2 2 0 0 0 10.65 17h6.7a2 2 0 0 0 1.97-1.61L21 8H7"/></svg>
            </a>
            <button class="search-btn" aria-label="Buscar">
                <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <a href="/login" class="btn-entrar" style="margin-left:5px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M9 18l6-6-6-6"/><path d="M15 12H3"/><rect x="17" y="3" width="4" height="18" rx="2"/></svg>
                <span>Entrar</span>
            </a>
        </div>
    </header>
    <section class="hero">
        <img id="banner-home" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Banner" style="width:100%;height:100%;object-fit:cover;display:block;" />
    </section>
    <script type="module" src="src/js/menu.js"></script>
    <script type="module" src="src/js/cartBadge.js"></script>
    <script type="module" src="src/js/headerUser.js"></script>

    <!-- CONTEÚDO DA PÁGINA DE PRODUTO -->
    <main class="product-page">
        <section class="product-detail container-large" aria-label="Detalhes do produto">
            <div class="product-detail__grid">
                <div class="product-detail__media">
                    <div class="product-gallery" aria-label="Galeria do produto">
                        <div class="product-detail__imageWrap">
                            <img id="mainProductImage" class="product-detail__image" src="" alt="" />
                        </div>
                        <div id="product-thumbnails" class="product-thumbnails" aria-label="Miniaturas"></div>
                    </div>
                </div>
                <div class="product-detail__content">
                    <h1 id="product-name" class="product-detail__title"></h1>
                    <div id="product-price" class="product-detail__price"></div>
                    <p id="product-short-description" class="product-detail__description"></p>

                    <div class="product-section" aria-label="Descrição completa">
                        <h3 class="product-section__title">Descrição completa</h3>
                        <div id="product-full-description" class="product-detail__fullDescription"></div>
                        <button id="toggle-full-description" class="product-detail__toggleDesc" type="button" aria-expanded="false" hidden>Ver mais</button>
                    </div>

                    <div class="product-detail__buy" aria-label="Compra">
                        <div class="product-detail__qtyRow">
                            <label class="product-detail__label">Quantidade</label>
                            <div class="product-detail__qtyControl">
                                <button class="product-detail__qtyBtn" id="qty-minus" type="button" aria-label="Diminuir quantidade">−</button>
                                <span class="product-detail__qtyValue" id="quantity" aria-live="polite">1</span>
                                <button class="product-detail__qtyBtn" id="qty-plus" type="button" aria-label="Aumentar quantidade">+</button>
                            </div>
                        </div>
                        <div class="product-detail__btnRow" aria-label="Ações de compra">
                            <button id="buy-now-btn" class="btn-comprar" type="button">Comprar agora</button>
                            <button id="add-to-cart-btn" class="btn-comprar" type="button">Adicionar ao carrinho</button>
                        </div>
                    </div>

                    <p id="product-message" class="product-message" aria-live="polite"></p>
                </div>

                <div class="product-detail__specRow" aria-label="Informações do produto">
                    <div class="product-section" aria-label="Especificações do jogo">
                        <h3 class="product-section__title">Especificações do jogo</h3>
                        <div id="game-specs" class="product-spec product-spec--inline"></div>
                    </div>

                    <div class="product-section" aria-label="Ficha técnica">
                        <h3 class="product-section__title">Ficha técnica</h3>
                        <div class="product-spec product-spec--inline">
                            <div class="product-spec__row"><span>Categoria</span><strong id="product-category"></strong></div>
                            <div class="product-spec__row"><span>Estoque disponível</span><strong id="product-stock"></strong></div>
                        </div>
                    </div>
                </div>

                <div class="product-detail__tech" aria-label="Especificações técnicas do produto">
                    <div class="product-section">
                        <h3 class="product-section__title">Especificações técnicas do produto</h3>
                        <div id="product-tech-specs" class="product-spec product-spec--inline"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER (copiado exatamente de /todos-os-jogos) -->
        <script type="module" src="src/js/productPage.js"></script>
    <div id="footer-container"></div>
    <script>
      fetch('/components/footer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('footer-container').innerHTML = html;
        });
    </script>
  <script type="module" src="src/js/script.js"></script>
</body>
</html>
